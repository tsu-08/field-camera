<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="JIOж’®еҪұ">
<meta name="theme-color" content="#0a0a0a">
<title>зҸҫе ҙж’®еҪұ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;}

/* в”Җв”Җ иө·еӢ•з”»йқў в”Җв”Җ */
#screen-start{
  position:fixed;inset:0;background:#1a1a1a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  color:#fff;
}
#screen-start h1{font-size:18px;letter-spacing:.1em;}
#pdf-label{
  width:72vw;max-width:280px;padding:18px 0;
  background:#4af;color:#000;border:none;border-radius:12px;
  font-size:17px;font-weight:bold;cursor:pointer;
  text-align:center;display:block;
}
#pdf-input{display:none;}
#pdf-status{font-size:13px;color:#aaa;min-height:18px;text-align:center;}
#proc-msg{font-size:14px;color:#4af;display:none;}
#btn-start{
  width:72vw;max-width:280px;padding:18px 0;
  background:#2563eb;color:#fff;border:none;border-radius:12px;
  font-size:17px;font-weight:bold;cursor:pointer;
}
#btn-start:disabled{background:#444;color:#888;cursor:default;}

/* в”Җв”Җ гӮ«гғЎгғ©з”»йқў в”Җв”Җ */
#screen-camera{
  position:fixed;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:#000;
}
#screen-camera.active{display:flex;}

#viewport{
  position:relative;
  background:#111;
  overflow:hidden;
  flex-shrink:0;
}
#video{width:100%;height:100%;object-fit:fill;display:block;}
#canvas{display:none;}
#pdf-canvas{display:none;}

/* в”Җв”Җ зңӢжқҝ в”Җв”Җ */
#sign-wrap{
  position:absolute;
  /* еҲқжңҹдҪҚзҪ®: еҸідёӢгҖӮз”»йқўеӣһи»ўеҫҢгҒҜJSгҒ§%еҶҚиЁҲз®— */
  bottom:12px;right:12px;
  width:28%; /* viewportгҒ®28% */
  touch-action:none;user-select:none;
  cursor:grab;
}
#sign-wrap:active{cursor:grabbing;}
#sign-img{width:100%;display:block;pointer-events:none;box-shadow:0 2px 10px rgba(0,0,0,.5);}
#resize-handle{
  position:absolute;top:-8px;right:-8px;
  width:20px;height:20px;
  background:#fff;border:2px solid #333;border-radius:50%;
  cursor:nwse-resize;touch-action:none;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#333;
}

/* в”Җв”Җ UIгғҗгғј в”Җв”Җ */
#ui-bar{
  position:fixed;bottom:0;left:0;right:0;
  padding:8px 16px 12px;
  background:rgba(0,0,0,.6);
  display:flex;align-items:center;gap:12px;
  flex-wrap:wrap;
}
#ui-bar label{color:#ddd;font-size:12px;white-space:nowrap;}
#opacity-slider{flex:1;min-width:80px;max-width:160px;}
#btn-change-pdf{
  font-size:11px;color:#aaa;background:none;
  border:1px solid #555;border-radius:4px;
  padding:4px 8px;cursor:pointer;white-space:nowrap;
}
#btn-shutter{
  margin-left:auto;
  width:56px;height:56px;border-radius:50%;
  background:#fff;border:4px solid #aaa;
  cursor:pointer;flex-shrink:0;
}
#btn-shutter:active{background:#ddd;}

/* в”Җв”Җ гғ—гғ¬гғ“гғҘгғј в”Җв”Җ */
#preview{
  position:fixed;inset:0;background:rgba(0,0,0,.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  z-index:100;
}
#preview.show{display:flex;}
#prev-img{max-width:90vw;max-height:60vh;object-fit:contain;}
#prev-meta{color:#ccc;font-size:13px;}
.preview-btns{display:flex;gap:16px;}
.preview-btns button{
  padding:10px 28px;border:none;border-radius:8px;font-size:15px;cursor:pointer;
}
#btn-save{background:#2563eb;color:#fff;}
#btn-retake{background:#555;color:#fff;}
</style>
</head>
<body>

<!-- иө·еӢ•з”»йқў -->
<div id="screen-start">
  <h1>JIO зҸҫе ҙж’®еҪұ</h1>
  <label id="pdf-label">рҹ“„ PDFгӮ’йҒёжҠһ
    <input id="pdf-input" type="file" accept="application/pdf">
  </label>
  <div id="pdf-status">иЎЁзӨәжқҝPDFгӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„</div>
  <div id="proc-msg">рҹ”Қ жһ гӮ’жӨңеҮәдёӯвҖҰ</div>
  <button id="btn-start" disabled>гӮ«гғЎгғ©иө·еӢ•</button>
</div>

<!-- гӮ«гғЎгғ©з”»йқў -->
<div id="screen-camera">
  <div id="viewport">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <canvas id="pdf-canvas"></canvas>
    <div id="sign-wrap">
      <div id="resize-handle">вҶ—</div>
      <img id="sign-img" src="" alt="">
    </div>
  </div>
  <div id="ui-bar">
    <label>зңӢжқҝйҖҸйҒҺ
      <input id="opacity-slider" type="range" min="0" max="100" value="100">
    </label>
    <button id="btn-change-pdf">PDFеӨүжӣҙ</button>
    <button id="btn-shutter"></button>
  </div>
</div>

<!-- гғ—гғ¬гғ“гғҘгғј -->
<div id="preview">
  <img id="prev-img" src="" alt="preview">
  <div id="prev-meta"></div>
  <div class="preview-btns">
    <button id="btn-save">дҝқеӯҳ</button>
    <button id="btn-retake">ж’®гӮҠзӣҙгҒҷ</button>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const pdfInput     = document.getElementById('pdf-input');
const pdfStatus    = document.getElementById('pdf-status');
const procMsg      = document.getElementById('proc-msg');
const screenStart  = document.getElementById('screen-start');
const screenCamera = document.getElementById('screen-camera');
const video        = document.getElementById('video');
const canvas       = document.getElementById('canvas');
const pdfCanvas    = document.getElementById('pdf-canvas');
const viewport     = document.getElementById('viewport');
const signWrap     = document.getElementById('sign-wrap');
const signImg      = document.getElementById('sign-img');
const resizeHandle = document.getElementById('resize-handle');
const opacitySlider= document.getElementById('opacity-slider');
const btnChangePdf = document.getElementById('btn-change-pdf');
const btnShutter   = document.getElementById('btn-shutter');
const preview      = document.getElementById('preview');
const prevImg      = document.getElementById('prev-img');
const prevMeta     = document.getElementById('prev-meta');
const btnSave      = document.getElementById('btn-save');
const btnRetake    = document.getElementById('btn-retake');
const btnStart     = document.getElementById('btn-start');

let pdfFileName = '';
let capturedUrl = null, capturedDate = null;

// зңӢжқҝдҪҚзҪ®гӮ’еүІеҗҲгҒ§з®ЎзҗҶпјҲз”»йқўеӣһи»ўгҒ—гҒҰгӮӮж¶ҲгҒҲгҒӘгҒ„пјү
// 0гҖң1гҒ®зҜ„еӣІгҖӮеҲқжңҹеҖӨгҒҜеҸідёӢ
let signPosRatio = { x: null, y: null }; // nullгҒҜгҖҢеҲқжңҹй…ҚзҪ®гҖҚ
let signWidthRatio = 0.28; // viewportгҒ®28%

// в”Җв”Җ PDFиӘӯгҒҝиҫјгҒҝ & жһ жӨңеҮәгӮҜгғӯгғғгғ— в”Җв”Җ
pdfInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  pdfFileName = file.name;
  pdfStatus.textContent = '';
  procMsg.style.display = 'block';

  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const page = await pdf.getPage(1);

    const scale = 3.0;
    const vp = page.getViewport({ scale });
    pdfCanvas.width  = vp.width;
    pdfCanvas.height = vp.height;
    const ctx = pdfCanvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport: vp }).promise;

    const croppedDataUrl = cropSignFromCanvas(pdfCanvas);
    signImg.src = croppedDataUrl;

    procMsg.style.display = 'none';
    pdfStatus.textContent = 'вң… ' + file.name;
    btnStart.disabled = false;
    btnStart.style.background = '#2563eb';
    btnStart.style.color = '#fff';

    // гӮ«гғЎгғ©з”»йқўгҒӢгӮүгҒ®PDFеӨүжӣҙгҒ®е ҙеҗҲгҒҜгҒқгҒ®гҒҫгҒҫзңӢжқҝе·®гҒ—жӣҝгҒҲ
    if (video.srcObject) {
      signPosRatio = { x: null, y: null };
      applySignLayout();
    }

  } catch(err) {
    procMsg.style.display = 'none';
    pdfStatus.textContent = 'вқҢ еӨұж•—: ' + err.message;
  }
});

// в”Җв”Җ гӮ«гғЎгғ©иө·еӢ•гғңгӮҝгғі в”Җв”Җ
btnStart.addEventListener('click', async () => {
  try {
    await startCamera();
    signPosRatio = { x: null, y: null };
    applySignLayout();
    screenStart.style.display = 'none';
    screenCamera.classList.add('active');
  } catch(e) {
    alert('гӮ«гғЎгғ©гҒ®иө·еӢ•гҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: ' + e.message);
  }
});

// в”Җв”Җ жһ жӨңеҮәпјҲзҷҪдҪҷзҷҪгӮ’еӣӣж–№гҒӢгӮүеүҠгӮӢпјүв”Җв”Җ
function cropSignFromCanvas(srcCanvas) {
  const ctx = srcCanvas.getContext('2d');
  const w = srcCanvas.width, h = srcCanvas.height;
  const d = ctx.getImageData(0, 0, w, h).data;

  const dark = (x,y) => { const i=(y*w+x)*4; return d[i]<90&&d[i+1]<90&&d[i+2]<90; };
  const halfH = Math.floor(h * 0.6), rowThr = w * 0.12;
  let top=-1, bottom=-1, left=w, right=0;

  // дёҠ60%гҒ®гҒҝжҺўзҙўпјҲPDFдёӢйғЁгҒ®жіЁиЁҳгғҶгӮӯгӮ№гғҲгӮ’йҷӨеӨ–пјү
  for (let y=0; y<halfH; y++) {
    let c=0;
    for (let x=0; x<w; x++) if (dark(x,y)) c++;
    if (c > rowThr) { if (top===-1) top=y; bottom=y; }
  }
  if (top !== -1) {
    for (let y=top; y<=bottom; y++) {
      for (let x=0;   x<w;  x++) { if (dark(x,y)) { left  = Math.min(left,  x); break; } }
      for (let x=w-1; x>=0; x--) { if (dark(x,y)) { right = Math.max(right, x); break; } }
    }
  }
  // гғ•гӮ©гғјгғ«гғҗгғғгӮҜ
  if (top===-1 || right<=left) {
    top=Math.floor(h*.05); bottom=Math.floor(h*.45);
    left=Math.floor(w*.04); right=Math.floor(w*.96);
  }

  const pad = Math.floor(w * 0.008);
  top=Math.max(0,top-pad); bottom=Math.min(h-1,bottom+pad);
  left=Math.max(0,left-pad); right=Math.min(w-1,right+pad);

  const cw = right - left, ch = bottom - top;
  const out = document.createElement('canvas');
  out.width = cw; out.height = ch;
  out.getContext('2d').drawImage(srcCanvas, left, top, cw, ch, 0, 0, cw, ch);
  return out.toDataURL('image/png');
}

// в”Җв”Җ гӮ«гғЎгғ©иө·еӢ• в”Җв”Җ
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:'environment', width:{min:1920, ideal:9999}, height:{min:1080, ideal:9999} },
    audio:false
  });
  video.srcObject = stream;
  await new Promise(resolve => {
    video.addEventListener('loadedmetadata', () => { resolve(); }, { once:true });
  });
  fitViewport();
}

// в”Җв”Җ viewport гӮ’гӮ«гғЎгғ©жҜ”зҺҮгғ»з”»йқўгӮөгӮӨгӮәгҒ«еҗҲгӮҸгҒӣгӮӢ в”Җв”Җ
const UI_BAR_H = 76;

function fitViewport() {
  if (!video.videoWidth) return;
  const aspect = video.videoWidth / video.videoHeight;
  const sw = window.innerWidth;
  const sh = window.innerHeight - UI_BAR_H;
  let w, h;
  if (sw / sh > aspect) { h = sh; w = h * aspect; }
  else                  { w = sw; h = w / aspect; }
  viewport.style.width  = w + 'px';
  viewport.style.height = h + 'px';
  applySignLayout();
}

// в”Җв”Җ зңӢжқҝгҒ®дҪҚзҪ®гғ»гӮөгӮӨгӮәгӮ’ viewport гҒ«еҗҲгӮҸгҒӣгҒҰйҒ©з”Ё в”Җв”Җ
function applySignLayout() {
  const vr = viewport.getBoundingClientRect();
  const vw = vr.width || parseFloat(viewport.style.width) || window.innerWidth;
  const vh = vr.height || parseFloat(viewport.style.height) || (window.innerHeight - UI_BAR_H);

  // е№…гӮ’иЁӯе®ҡ
  const sw = vw * signWidthRatio;
  signWrap.style.width = sw + 'px';

  if (signPosRatio.x === null) {
    // еҲқжңҹй…ҚзҪ®: еҸідёӢ
    signWrap.style.right  = '12px';
    signWrap.style.bottom = '12px';
    signWrap.style.left   = 'auto';
    signWrap.style.top    = 'auto';
  } else {
    // еүІеҗҲгҒӢгӮүpxиЁҲз®—гҒ—гҒҰйҒ©з”Ё
    const sh2 = signWrap.getBoundingClientRect().height || sw * 0.7;
    let nx = signPosRatio.x * vw;
    let ny = signPosRatio.y * vh;
    nx = Math.max(0, Math.min(nx, vw - sw));
    ny = Math.max(0, Math.min(ny, vh - sh2));
    signWrap.style.left   = nx + 'px';
    signWrap.style.top    = ny + 'px';
    signWrap.style.right  = 'auto';
    signWrap.style.bottom = 'auto';
  }
}

// в”Җв”Җ з”»йқўеӣһи»ўгғ»гғӘгӮөгӮӨгӮәеҜҫеҝң в”Җв”Җ
// orientationchange вҶ’ resize гҒ®й ҶгҒ§зҷәзҒ«гҒҷгӮӢгҒ®гҒ§дёЎж–№еҜҫеҝң
let resizeTimer = null;
function onOrientationOrResize() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    fitViewport();
  }, 120); // еӣһи»ўгӮўгғӢгғЎгғјгӮ·гғ§гғіе®ҢдәҶгӮ’еҫ…гҒӨ
}
window.addEventListener('resize', onOrientationOrResize);
window.addEventListener('orientationchange', onOrientationOrResize);

// в”Җв”Җ PDFеӨүжӣҙгғңгӮҝгғі в”Җв”Җ
btnChangePdf.addEventListener('click', () => pdfInput.click());

// в”Җв”Җ зңӢжқҝгғүгғ©гғғгӮ°пјҲдҪҚзҪ®гӮ’%гҒ§иЁҳйҢІпјүв”Җв”Җ
function getXY(e) {
  return e.touches ? {x:e.touches[0].clientX,y:e.touches[0].clientY}
                   : {x:e.clientX,y:e.clientY};
}
let dragActive=false, dragOX=0, dragOY=0;
signWrap.addEventListener('mousedown',  startDrag);
signWrap.addEventListener('touchstart', startDrag, {passive:false});
function startDrag(e) {
  if (e.target===resizeHandle) return;
  e.preventDefault(); dragActive=true;
  const r=signWrap.getBoundingClientRect(), p=getXY(e);
  dragOX=p.x-r.left; dragOY=p.y-r.top;
  // гғүгғ©гғғгӮ°й–Ӣе§ӢжҷӮгҒ«left/topгҒ«еҲҮгӮҠжӣҝгҒҲ
  const vr=viewport.getBoundingClientRect();
  signWrap.style.left   = (r.left-vr.left)+'px';
  signWrap.style.top    = (r.top-vr.top)+'px';
  signWrap.style.right  = 'auto';
  signWrap.style.bottom = 'auto';
}

let resizeActive=false, resizeStartX=0, resizeStartW=0;
resizeHandle.addEventListener('mousedown',  startResize);
resizeHandle.addEventListener('touchstart', startResize, {passive:false});
function startResize(e) {
  e.preventDefault(); e.stopPropagation(); resizeActive=true;
  resizeStartX=getXY(e).x;
  resizeStartW=signWrap.getBoundingClientRect().width;
}

window.addEventListener('mousemove',  onMove);
window.addEventListener('touchmove',  onMove, {passive:false});
function onMove(e) {
  const p=getXY(e);
  if (dragActive) {
    e.preventDefault();
    const vr=viewport.getBoundingClientRect(), sr=signWrap.getBoundingClientRect();
    let nx=Math.max(0,Math.min(p.x-vr.left-dragOX, vr.width-sr.width));
    let ny=Math.max(0,Math.min(p.y-vr.top-dragOY,  vr.height-sr.height));
    signWrap.style.left=nx+'px'; signWrap.style.top=ny+'px';
    // дҪҚзҪ®гӮ’еүІеҗҲгҒ§иЁҳйҢІ
    signPosRatio.x = nx / vr.width;
    signPosRatio.y = ny / vr.height;
  }
  if (resizeActive) {
    e.preventDefault();
    const vr=viewport.getBoundingClientRect();
    const newW=Math.max(60, Math.min(resizeStartW+(p.x-resizeStartX), vr.width*0.8));
    signWrap.style.width=newW+'px';
    signWidthRatio = newW / vr.width; // е№…жҜ”зҺҮгӮӮжӣҙж–°
  }
}
window.addEventListener('mouseup',  endInteract);
window.addEventListener('touchend', endInteract);
function endInteract(){dragActive=false;resizeActive=false;}

// в”Җв”Җ йҖҸйҒҺгӮ№гғ©гӮӨгғҖгғј в”Җв”Җ
opacitySlider.addEventListener('input',()=>{
  signWrap.style.opacity=opacitySlider.value/100;
});

// в”Җв”Җ ж’®еҪұ в”Җв”Җ
btnShutter.addEventListener('click',()=>{
  const vr=viewport.getBoundingClientRect();
  const TW=video.videoWidth, TH=video.videoHeight;
  canvas.width=TW; canvas.height=TH;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(video,0,0,TW,TH);

  const sr=signWrap.getBoundingClientRect();
  const scaleX=TW/vr.width, scaleY=TH/vr.height;
  const tmpImg=new Image();
  tmpImg.onload=()=>{
    ctx.save();
    ctx.globalAlpha=parseFloat(signWrap.style.opacity||'1');
    ctx.drawImage(tmpImg,
      (sr.left-vr.left)*scaleX, (sr.top-vr.top)*scaleY,
      sr.width*scaleX, sr.height*scaleY
    );
    ctx.restore();
    capturedUrl=canvas.toDataURL('image/jpeg',0.85);
    capturedDate=new Date();
    prevMeta.textContent='ж’®еҪұж—ҘжҷӮ: '+capturedDate.toLocaleString('ja-JP')+'гҖҖ'+TW+'Г—'+TH;
    prevImg.src=capturedUrl;
    preview.classList.add('show');
  };
  tmpImg.src=signImg.src;
});

// в”Җв”Җ дҝқеӯҳ в”Җв”Җ
btnSave.addEventListener('click', async () => {
  const ts   = capturedDate.toISOString().replace(/[-:.TZ]/g,'').slice(0,15);
  const base = pdfFileName.replace(/\.pdf$/i,'') || 'JIO';
  const filename = `${base}_${ts}.jpg`;

  // BlobеӨүжҸӣ
  const res  = await fetch(capturedUrl);
  const blob = await res.blob();
  const file = new File([blob], filename, { type: 'image/jpeg' });

  // Web Share API гҒ§гғ•гӮ©гғҲпјҲгӮ®гғЈгғ©гғӘгғјпјүгҒ«дҝқеӯҳ
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: filename });
      preview.classList.remove('show');
      capturedUrl = null;
      return;
    } catch(e) {
      if (e.name === 'AbortError') return; // гғҰгғјгӮ¶гғјгҒҢгӮӯгғЈгғігӮ»гғ«
      // еӨұж•—гҒ—гҒҹгӮүгғ•гӮ©гғјгғ«гғҗгғғгӮҜ
    }
  }

  // гғ•гӮ©гғјгғ«гғҗгғғгӮҜ: йҖҡеёёгғҖгӮҰгғігғӯгғјгғү
  Object.assign(document.createElement('a'), {
    download: filename, href: capturedUrl
  }).click();
  preview.classList.remove('show');
  capturedUrl = null;
});

btnRetake.addEventListener('click',()=>{
  preview.classList.remove('show');
  capturedUrl=null;
});
</script>

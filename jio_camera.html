<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="JIO撮影">
<meta name="theme-color" content="#0a0a0a">
<title>現場撮影</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100dvh;background:#000;overflow:hidden;
  font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;}

/* ── 起動画面 ── */
#screen-start{
  position:fixed;inset:0;background:#111;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  color:#fff;
}
#screen-start h1{font-size:20px;letter-spacing:.1em;}
#btn-start{
  padding:14px 40px;font-size:16px;border:none;border-radius:8px;
  background:#2563eb;color:#fff;cursor:pointer;
}

/* ── カメラ画面 ── */
#screen-camera{
  position:fixed;inset:0;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:#000;
}
#screen-camera.active{display:flex;}

/* カメラコンテナ: JSでアスペクト比を動的にセット */
#viewport{
  position:relative;
  background:#111;
  overflow:hidden;
  /* width/height は JS で設定 */
}

#video{
  width:100%;height:100%;
  object-fit:fill; /* コンテナと映像サイズが一致するのでfillでOK */
  display:block;
}
#canvas{display:none;}

/* ── 看板 ── */
#sign-wrap{
  position:absolute;
  bottom:16px;right:16px;
  width:120px;
  touch-action:none;user-select:none;
  cursor:grab;
}
#sign-wrap:active{cursor:grabbing;}

#sign-img{
  width:100%;display:block;
  pointer-events:none;
}

/* リサイズハンドル（右上） */
#resize-handle{
  position:absolute;top:-8px;right:-8px;
  width:20px;height:20px;
  background:#fff;border:2px solid #333;border-radius:50%;
  cursor:nwse-resize;touch-action:none;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#333;
}

/* ── UIバー ── */
#ui-bar{
  position:fixed;bottom:0;left:0;right:0;
  padding:10px 16px 16px;
  background:rgba(0,0,0,.6);
  display:flex;align-items:center;gap:12px;
  flex-wrap:wrap;
}
#ui-bar label{color:#ddd;font-size:12px;white-space:nowrap;}
#opacity-slider{flex:1;min-width:80px;max-width:160px;}

#btn-shutter{
  margin-left:auto;
  width:60px;height:60px;border-radius:50%;
  background:#fff;border:4px solid #aaa;
  cursor:pointer;flex-shrink:0;
}
#btn-shutter:active{background:#ddd;}

/* ── プレビュー ── */
#preview{
  position:fixed;inset:0;background:rgba(0,0,0,.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  z-index:100;
}
#preview.show{display:flex;}
#prev-img{max-width:90vw;max-height:60dvh;object-fit:contain;}
#prev-meta{color:#ccc;font-size:13px;}
.preview-btns{display:flex;gap:16px;}
.preview-btns button{
  padding:10px 28px;border:none;border-radius:8px;font-size:15px;cursor:pointer;
}
#btn-save{background:#2563eb;color:#fff;}
#btn-retake{background:#555;color:#fff;}
</style>
</head>
<body>

<!-- 起動画面 -->
<div id="screen-start">
  <h1>JIO 現場撮影</h1>
  <button id="btn-start">カメラ起動</button>
</div>

<!-- カメラ画面 -->
<div id="screen-camera">
  <div id="viewport">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <!-- 看板 -->
    <div id="sign-wrap">
      <div id="resize-handle">↗</div>
      <canvas id="sign-img"></canvas>
    </div>
  </div>

  <!-- UIバー -->
  <div id="ui-bar">
    <label>看板透過
      <input id="opacity-slider" type="range" min="0" max="100" value="100">
    </label>
    <button id="btn-shutter"></button>
  </div>
</div>

<!-- プレビュー -->
<div id="preview">
  <img id="prev-img" src="" alt="preview">
  <div id="prev-meta"></div>
  <div class="preview-btns">
    <button id="btn-save">保存</button>
    <button id="btn-retake">撮り直す</button>
  </div>
</div>

<script>
// ── PDF看板描画 ──
const SIGN_DATA = {
  number: 'Y3346772',
  company: '株式会社 日本住宅保証検査機構'
};

function drawSign(canvas) {
  const W = 280, H = 210;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const lw = 3;

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = lw;
  ctx.strokeRect(lw/2, lw/2, W-lw, H-lw);

  // ヘッダー「登録物件番号」
  const headerH = H * 0.28;
  ctx.font = `bold ${headerH*0.42}px 'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif`;
  ctx.fillStyle = '#000';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('登 録 物 件 番 号', W/2, headerH/2);

  // 仕切り線
  ctx.beginPath();
  ctx.moveTo(lw/2, headerH);
  ctx.lineTo(W-lw/2, headerH);
  ctx.stroke();

  // 番号
  const numY = headerH;
  const numH = H * 0.42;
  ctx.font = `bold ${numH*0.62}px 'Arial Black',Arial,sans-serif`;
  ctx.fillText(SIGN_DATA.number, W/2, numY + numH/2);

  // 仕切り線
  ctx.beginPath();
  ctx.moveTo(lw/2, numY+numH);
  ctx.lineTo(W-lw/2, numY+numH);
  ctx.stroke();

  // フッター
  const footerY = numY + numH;
  const footerH = H - footerY;
  const logoSize = footerH * 0.72;
  const logoX = W * 0.05;
  const logoY = footerY + (footerH - logoSize) / 2;

  // JIOロゴ背景
  ctx.fillStyle = '#000';
  ctx.fillRect(logoX, logoY, logoSize, logoSize);
  // 三角（屋根）
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(logoX, logoY + logoSize*0.42);
  ctx.lineTo(logoX + logoSize/2, logoY + logoSize*0.04);
  ctx.lineTo(logoX + logoSize, logoY + logoSize*0.42);
  ctx.closePath();
  ctx.fill();
  // JIO文字
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${logoSize*0.30}px 'Arial Black',Arial,sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('JIO', logoX + logoSize/2, logoY + logoSize*0.72);

  // 会社名
  ctx.fillStyle = '#000';
  const cfs = Math.min(footerH * 0.28, W * 0.052);
  ctx.font = `bold ${cfs}px 'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif`;
  ctx.textAlign = 'left';
  const tx = logoX + logoSize + W*0.04;
  ctx.fillText('株式会社', tx, footerY + footerH * 0.32);
  ctx.fillText('日本住宅保証検査機構', tx, footerY + footerH * 0.68);
}

// ── 初期化 ──
const btnStart   = document.getElementById('btn-start');
const screenStart  = document.getElementById('screen-start');
const screenCamera = document.getElementById('screen-camera');
const video      = document.getElementById('video');
const canvas     = document.getElementById('canvas');
const viewport   = document.getElementById('viewport');
const signWrap   = document.getElementById('sign-wrap');
const signImg    = document.getElementById('sign-img');
const resizeHandle = document.getElementById('resize-handle');
const opacitySlider = document.getElementById('opacity-slider');
const btnShutter = document.getElementById('btn-shutter');
const preview    = document.getElementById('preview');
const prevImg    = document.getElementById('prev-img');
const prevMeta   = document.getElementById('prev-meta');
const btnSave    = document.getElementById('btn-save');
const btnRetake  = document.getElementById('btn-retake');

drawSign(signImg);

// ── カメラ起動 & アスペクト比自動検出 ──
btnStart.addEventListener('click', async () => {
  try {
    // まず理想サイズでリクエスト（デバイスのデフォルト比率を尊重）
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 4096 }, height: { ideal: 4096 } },
      audio: false
    });
    video.srcObject = stream;

    video.addEventListener('loadedmetadata', () => {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const aspect = vw / vh; // 実際のカメラ比率（16:9 や 4:3 など）

      // ビューポートをカメラ比率に合わせてリサイズ
      fitViewport(aspect);

      screenStart.style.display = 'none';
      screenCamera.classList.add('active');
    }, { once: true });

  } catch(e) {
    alert('カメラの起動に失敗しました: ' + e.message);
  }
});

function fitViewport(aspect) {
  const sw = window.innerWidth;
  const sh = window.innerHeight - 90; // UIバー分引く

  let w, h;
  if (sw / sh > aspect) {
    // 縦が制限
    h = sh;
    w = h * aspect;
  } else {
    // 横が制限
    w = sw;
    h = w / aspect;
  }
  viewport.style.width  = w + 'px';
  viewport.style.height = h + 'px';
}

window.addEventListener('resize', () => {
  if (video.videoWidth) fitViewport(video.videoWidth / video.videoHeight);
});

// ── 看板ドラッグ ──
function getXY(e) {
  return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
                   : { x: e.clientX, y: e.clientY };
}

let dragActive = false, dragOX = 0, dragOY = 0;
signWrap.addEventListener('mousedown',  startDrag);
signWrap.addEventListener('touchstart', startDrag, { passive: false });

function startDrag(e) {
  if (e.target === resizeHandle) return;
  e.preventDefault();
  dragActive = true;
  const r = signWrap.getBoundingClientRect(), p = getXY(e);
  dragOX = p.x - r.left; dragOY = p.y - r.top;
}

// ── 看板リサイズ（右上ハンドル）──
let resizeActive = false, resizeStartX = 0, resizeStartY = 0, resizeStartW = 0;
resizeHandle.addEventListener('mousedown',  startResize);
resizeHandle.addEventListener('touchstart', startResize, { passive: false });

function startResize(e) {
  e.preventDefault(); e.stopPropagation();
  resizeActive = true;
  const p = getXY(e);
  resizeStartX = p.x; resizeStartY = p.y;
  resizeStartW = signWrap.getBoundingClientRect().width;
}

window.addEventListener('mousemove',  onMove);
window.addEventListener('touchmove',  onMove, { passive: false });

function onMove(e) {
  const p = getXY(e);
  if (dragActive) {
    e.preventDefault();
    const vr = viewport.getBoundingClientRect(), sr = signWrap.getBoundingClientRect();
    let nx = p.x - vr.left - dragOX;
    let ny = p.y - vr.top  - dragOY;
    nx = Math.max(0, Math.min(nx, vr.width  - sr.width));
    ny = Math.max(0, Math.min(ny, vr.height - sr.height));
    signWrap.style.left = nx + 'px'; signWrap.style.top = ny + 'px';
    signWrap.style.right = 'auto'; signWrap.style.bottom = 'auto';
  }
  if (resizeActive) {
    e.preventDefault();
    const vr = viewport.getBoundingClientRect();
    const dx = p.x - resizeStartX;
    const newW = Math.max(60, Math.min(resizeStartW + dx, vr.width * 0.8));
    signWrap.style.width = newW + 'px';
  }
}

window.addEventListener('mouseup',  endInteract);
window.addEventListener('touchend', endInteract);
function endInteract() { dragActive = false; resizeActive = false; }

// ── 透過スライダー ──
opacitySlider.addEventListener('input', () => {
  signWrap.style.opacity = opacitySlider.value / 100;
});

// ── 撮影 ──
let capturedUrl = null, capturedDate = null;

btnShutter.addEventListener('click', () => {
  const vr = viewport.getBoundingClientRect();
  const TW = video.videoWidth, TH = video.videoHeight;
  canvas.width = TW; canvas.height = TH;
  const ctx = canvas.getContext('2d');

  // カメラ映像をそのままの解像度で描画
  ctx.drawImage(video, 0, 0, TW, TH);

  // 看板を映像解像度にスケールして描画
  const sr = signWrap.getBoundingClientRect();
  const scaleX = TW / vr.width, scaleY = TH / vr.height;
  ctx.save();
  ctx.globalAlpha = parseFloat(signWrap.style.opacity || '1');
  ctx.drawImage(
    signImg,
    (sr.left - vr.left) * scaleX,
    (sr.top  - vr.top ) * scaleY,
    sr.width  * scaleX,
    sr.height * scaleY
  );
  ctx.restore();

  capturedUrl  = canvas.toDataURL('image/jpeg', 0.85);
  capturedDate = new Date();
  prevMeta.textContent = '撮影日時: ' + capturedDate.toLocaleString('ja-JP') + '　サイズ: ' + TW + '×' + TH;
  prevImg.src = capturedUrl;
  preview.classList.add('show');
});

// ── 保存 ──
btnSave.addEventListener('click', () => {
  const ts = capturedDate.toISOString().replace(/[-:.TZ]/g,'').slice(0,15);
  Object.assign(document.createElement('a'), {
    download: `JIO_${SIGN_DATA.number}_${ts}.jpg`,
    href: capturedUrl
  }).click();
  preview.classList.remove('show');
  capturedUrl = null;
});

btnRetake.addEventListener('click', () => {
  preview.classList.remove('show');
  capturedUrl = null;
});
</script>
</body>
</html>
